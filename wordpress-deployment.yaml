---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-deployment
  labels:
    app: wordpress-deployment
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-deployment
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wordpress-deployment
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox # www-data kullanicisina yetki vermek icin
          command:
            [
              "sh",
              "-c",
              "chown -R 33:33 /var/www/html && chmod -R 775 /var/www/html",
            ]
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
      containers:
        - name: wordpress
          image: wordpress:php8.5-fpm
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          env:
            - name: WORDPRESS_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: wordpress-configmap
                  key: DB_HOST
            - name: WORDPRESS_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: wordpress-configmap
                  key: DB_NAME
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wordpress-secrets
                  key: DB_PASSWORD
            - name: WORDPRESS_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: wordpress-configmap
                  key: DB_USER
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
        - name: nginx
          image: nginx:latest
          securityContext: # Nginx container'ına securityContext ekleyerek onu da www-data grubuna dahil ettim
            runAsUser: 101
            runAsGroup: 33
            supplementalGroups: [33]
          ports:
            - containerPort: 80
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wordpress-pvc
        - name: nginx-config
          configMap:
            name: nginx-configmap
---
